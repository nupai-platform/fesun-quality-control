name: reusable-pr-gate

on:
  workflow_call:
    inputs:
      project: { required: true, type: string }
      bug_packet_path: { required: true, type: string }
      test_glob: { required: true, type: string }
      environment_id: { required: true, type: string }
      base_sha: { required: true, type: string }
      head_sha: { required: true, type: string }
    secrets:
      E2E_BASE_URL: { required: false }
      E2E_USERNAME: { required: false }
      E2E_PASSWORD: { required: false }
      E2E_READ_TOKEN: { required: false }
      E2E_ALLOWED_HOSTS: { required: false }
      QC_ALERT_WEBHOOK_URL: { required: false }

permissions:
  contents: read

jobs:
  candidate-test:
    name: candidate-test
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    steps:
      - name: Checkout exact candidate head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.head_sha }}
          fetch-depth: 0

      - name: Checkout immutable QC workflow source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .qc

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm

      - name: Install exact dependencies
        run: |
          npm ci --prefix .qc

      - name: Install locked acceptance harness
        run: |
          test -f testing/acceptance/package-lock.json
          npm ci --prefix testing/acceptance

      - name: Validate candidate workflow supply chain
        run: node --import tsx .qc/scripts/validate-workflows.ts .github/workflows/acceptance-gate.yml

      - name: Derive immutable Packet hash
        id: packet
        env:
          QC_PACKET_PATH: ${{ inputs.bug_packet_path }}
        run: |
          node --input-type=module -e "import{createHash}from'node:crypto';import{readFileSync}from'node:fs';import{appendFileSync}from'node:fs';appendFileSync(process.env.GITHUB_OUTPUT,'sha256='+createHash('sha256').update(readFileSync(process.env.QC_PACKET_PATH)).digest('hex')+'\n')"

      - name: Snapshot protected business files before test execution
        run: node --import tsx .qc/scripts/detect-business-code-change.ts --mode runtime-snapshot --output artifacts/worktree-before.json

      - name: Validate Packet
        continue-on-error: true
        env:
          QC_PACKET_PATH: ${{ inputs.bug_packet_path }}
        run: node --import tsx .qc/scripts/validate-packet.ts --packet "$QC_PACKET_PATH"

      - name: Classify risk from Packet and exact PR diff
        id: risk
        continue-on-error: true
        env:
          QC_PACKET_PATH: ${{ inputs.bug_packet_path }}
          QC_BASE_SHA: ${{ inputs.base_sha }}
          QC_HEAD_SHA: ${{ inputs.head_sha }}
        run: |
          set +e
          node --import tsx .qc/scripts/classify-risk.ts --packet "$QC_PACKET_PATH" --base "$QC_BASE_SHA" --head "$QC_HEAD_SHA"
          status=$?
          set -e
          node --input-type=module -e "import{readFileSync,appendFileSync}from'node:fs';const r=JSON.parse(readFileSync('artifacts/risk.json'));appendFileSync(process.env.GITHUB_OUTPUT,'profile='+(r.final_risk??'MANUAL_REVIEW')+'\n')"
          exit "$status"

      - name: Scan weak assertions
        continue-on-error: true
        env:
          QC_TEST_GLOB: ${{ inputs.test_glob }}
        run: node --import tsx .qc/scripts/detect-weak-assertions.ts "$QC_TEST_GLOB"

      - name: Scan orphan integrations
        continue-on-error: true
        run: node --import tsx .qc/scripts/detect-orphan-integrations.ts --root . --map .qc/spine/code-impact-map.yaml

      - name: Create trusted execution envelope
        run: |
          mkdir -p artifacts
          node --input-type=module -e "import{writeFileSync}from'node:fs';writeFileSync('artifacts/execution-state.json',JSON.stringify({state:'EXECUTING',state_entered_at:new Date().toISOString(),retry_count:Number(process.env.GITHUB_RUN_ATTEMPT)-1,cost_usd:0,api_calls:0,parallel_runs:1,cleanup_debt:0},null,2))"

      - name: Install Chromium
        continue-on-error: true
        run: npm --prefix testing/acceptance exec -- playwright install --with-deps chromium

      - name: Run 1 with machine evidence reporter
        continue-on-error: true
        env:
          QC_TEST_GLOB: ${{ inputs.test_glob }}
          QC_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-1
          QC_BASE_SHA: ${{ inputs.base_sha }}
          QC_HEAD_SHA: ${{ inputs.head_sha }}
          QC_SHA: ${{ job.workflow_sha }}
          QC_PACKET_SHA256: ${{ steps.packet.outputs.sha256 }}
          QC_ENVIRONMENT_ID: ${{ inputs.environment_id }}
          STORE_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          STORE_E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          STORE_E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          CRM_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          CRM_E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          CRM_E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          MOS_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          MOS_E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          MOS_E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          PLATFORM_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          PLATFORM_E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          PLATFORM_E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          mkdir -p artifacts/run-1
          set +e
          npm --prefix testing/acceptance exec -- playwright test "$QC_TEST_GLOB" --project=chromium --reporter=json,./.qc/reporters/playwright-evidence-reporter.ts > artifacts/run-1/report.json
          status=$?
          set -e
          cp artifacts/run-1/report.json artifacts/report.json
          exit "$status"

      - name: Run 2 with fresh process for STANDARD+
        if: ${{ steps.risk.outputs.profile != 'FAST' }}
        continue-on-error: true
        env:
          QC_TEST_GLOB: ${{ inputs.test_glob }}
          QC_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-2
          QC_BASE_SHA: ${{ inputs.base_sha }}
          QC_HEAD_SHA: ${{ inputs.head_sha }}
          QC_SHA: ${{ job.workflow_sha }}
          QC_PACKET_SHA256: ${{ steps.packet.outputs.sha256 }}
          QC_ENVIRONMENT_ID: ${{ inputs.environment_id }}
          QC_ARTIFACT_DIR: artifacts/run-2
          STORE_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          STORE_E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          STORE_E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          CRM_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          CRM_E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          CRM_E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          MOS_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          MOS_E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          MOS_E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          PLATFORM_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          PLATFORM_E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          PLATFORM_E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          mkdir -p artifacts/run-2
          npm --prefix testing/acceptance exec -- playwright test "$QC_TEST_GLOB" --project=chromium --reporter=json,./.qc/reporters/playwright-evidence-reporter.ts > artifacts/run-2/report.json

      - name: Verify test worker did not mutate business code
        if: always()
        continue-on-error: true
        run: node --import tsx .qc/scripts/detect-business-code-change.ts --mode runtime-verify --snapshot artifacts/worktree-before.json

      - name: Copy immutable Packet into handoff
        if: always()
        env:
          QC_PACKET_PATH: ${{ inputs.bug_packet_path }}
        run: cp -- "$QC_PACKET_PATH" artifacts/bug-packet.yaml

      - name: Upload candidate machine artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: candidate-${{ inputs.project }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          retention-days: 1
          if-no-files-found: error

  final-verdict:
    name: final-verdict
    if: ${{ always() }}
    needs: [candidate-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: fesun-staging-acceptance
    permissions:
      contents: read
    steps:
      - name: Checkout immutable QC workflow source only
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .qc

      - name: Checkout candidate Packet without executing candidate code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.head_sha }}
          path: .candidate
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Install immutable QC dependencies
        run: npm ci --prefix .qc

      - name: Download candidate machine artifacts
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: candidate-${{ inputs.project }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts

      - name: Replace handoff Packet with exact candidate-head Packet
        if: always()
        env:
          QC_INPUT_PACKET_PATH: ${{ inputs.bug_packet_path }}
        run: |
          case "$QC_INPUT_PACKET_PATH" in
            /*|../*|*/../*|*' '* ) echo 'unsafe Packet path' >&2; exit 1 ;;
          esac
          mkdir -p artifacts
          cp -- ".candidate/$QC_INPUT_PACKET_PATH" artifacts/bug-packet.yaml

      - name: Revalidate Packet in trusted job
        if: always()
        continue-on-error: true
        run: node --import tsx .qc/scripts/validate-packet.ts --packet artifacts/bug-packet.yaml

      - name: Enforce execution budget and TTL
        if: always()
        continue-on-error: true
        run: node --import tsx .qc/scripts/execution-gate.ts --state artifacts/execution-state.json

      - name: Collect independent read-only Oracle evidence
        if: always()
        continue-on-error: true
        env:
          QC_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-1
          QC_BASE_SHA: ${{ inputs.base_sha }}
          QC_HEAD_SHA: ${{ inputs.head_sha }}
          QC_SHA: ${{ job.workflow_sha }}
          QC_ENVIRONMENT_ID: ${{ inputs.environment_id }}
          STORE_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          STORE_E2E_ALLOWED_HOSTS: ${{ secrets.E2E_ALLOWED_HOSTS }}
          STORE_E2E_READ_TOKEN: ${{ secrets.E2E_READ_TOKEN }}
          CRM_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          CRM_E2E_ALLOWED_HOSTS: ${{ secrets.E2E_ALLOWED_HOSTS }}
          CRM_E2E_READ_TOKEN: ${{ secrets.E2E_READ_TOKEN }}
          MOS_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          MOS_E2E_ALLOWED_HOSTS: ${{ secrets.E2E_ALLOWED_HOSTS }}
          MOS_E2E_READ_TOKEN: ${{ secrets.E2E_READ_TOKEN }}
          PLATFORM_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          PLATFORM_E2E_ALLOWED_HOSTS: ${{ secrets.E2E_ALLOWED_HOSTS }}
          PLATFORM_E2E_READ_TOKEN: ${{ secrets.E2E_READ_TOKEN }}
        run: node --import tsx .qc/scripts/collect-oracle-evidence.ts --packet artifacts/bug-packet.yaml

      - name: Replay trusted CF-2 contract when declared
        if: always()
        continue-on-error: true
        env:
          STORE_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          STORE_E2E_ALLOWED_HOSTS: ${{ secrets.E2E_ALLOWED_HOSTS }}
          STORE_E2E_READ_TOKEN: ${{ secrets.E2E_READ_TOKEN }}
          CRM_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          CRM_E2E_ALLOWED_HOSTS: ${{ secrets.E2E_ALLOWED_HOSTS }}
          CRM_E2E_READ_TOKEN: ${{ secrets.E2E_READ_TOKEN }}
          MOS_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          MOS_E2E_ALLOWED_HOSTS: ${{ secrets.E2E_ALLOWED_HOSTS }}
          MOS_E2E_READ_TOKEN: ${{ secrets.E2E_READ_TOKEN }}
          PLATFORM_E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          PLATFORM_E2E_ALLOWED_HOSTS: ${{ secrets.E2E_ALLOWED_HOSTS }}
          PLATFORM_E2E_READ_TOKEN: ${{ secrets.E2E_READ_TOKEN }}
        run: node --import tsx .qc/scripts/run-counterfactual.ts --packet artifacts/bug-packet.yaml

      - name: Verify evidence integrity and independent coverage
        if: always()
        continue-on-error: true
        env:
          QC_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-1
          QC_BASE_SHA: ${{ inputs.base_sha }}
          QC_HEAD_SHA: ${{ inputs.head_sha }}
          QC_SHA: ${{ job.workflow_sha }}
          QC_ENVIRONMENT_ID: ${{ inputs.environment_id }}
        run: node --import tsx .qc/scripts/evidence-gate.ts --packet artifacts/bug-packet.yaml

      - name: Compute sole final verdict
        if: always()
        env:
          QC_SHA: ${{ job.workflow_sha }}
        run: node --import tsx .qc/scripts/verdict-gate.ts --packet artifacts/bug-packet.yaml

      - name: Alert failure classification
        if: always()
        continue-on-error: true
        env:
          QC_ALERT_WEBHOOK_URL: ${{ secrets.QC_ALERT_WEBHOOK_URL }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node --import tsx .qc/scripts/emit-alert.ts

      - name: Upload final evidence packet
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: acceptance-${{ inputs.project }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          retention-days: 14
          if-no-files-found: error
