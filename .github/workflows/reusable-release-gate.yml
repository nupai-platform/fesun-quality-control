name: reusable-release-gate
on:
  workflow_call:
    inputs:
      project: { required: true, type: string }
      head_sha: { required: true, type: string }
      test_glob: { required: true, type: string }
      nightly_passed: { required: true, type: boolean }
    secrets:
      E2E_BASE_URL: { required: true }
      E2E_USERNAME: { required: true }
      E2E_PASSWORD: { required: true }
permissions:
  contents: read
jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    environment: fesun-staging-acceptance
    steps:
      - name: Reject release while Nightly is unresolved
        env:
          QC_NIGHTLY_PASSED: ${{ inputs.nightly_passed }}
        run: test "$QC_NIGHTLY_PASSED" = "true"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { ref: "${{ inputs.head_sha }}" }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: "22", cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run all spines, permissions, migrations, and Oracle spot checks
        env:
          QC_TEST_GLOB: ${{ inputs.test_glob }}
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: npx playwright test "$QC_TEST_GLOB" --project=chromium
